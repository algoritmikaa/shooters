<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Shooter – Босс с огромным здоровьем</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { border: 2px solid #444; cursor: crosshair; background: #1a1a1a; }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85);
            pointer-events: none; opacity: 0;
            transition: opacity 0.3s; color: white;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .class-select {
            display: flex; gap: 15px; flex-wrap: wrap;
            justify-content: center; margin-top: 20px;
            max-width: 800px;
        }
        .class-btn {
            background: #2d2d2d; color: #ddd;
            border: 2px solid #555; padding: 15px 20px;
            font-size: 20px; cursor: pointer;
            border-radius: 12px; text-align: center;
            min-width: 140px; transition: all 0.2s;
        }
        .class-btn:hover { background: #3a6b3a; border-color: #8f8; }
        .class-btn .desc { font-size: 13px; margin-top: 6px; color: #aaa; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="overlay" id="classOverlay">
    <div class="class-select">
        <div class="class-btn" data-class="soldier">🔫 Солдат<div class="desc">M4A1, Рывок</div></div>
        <div class="class-btn" data-class="grenadier">💣 Гранадир<div class="desc">MP5, Гранатный залп</div></div>
        <div class="class-btn" data-class="sniper">🎯 Снайпер<div class="desc">AWP, Меткий выстрел</div></div>
        <div class="class-btn" data-class="medic">💊 Медик<div class="desc">Реген, Лечение</div></div>
        <div class="class-btn" data-class="engineer">🛠️ Инженер<div class="desc">SPAS-12, Турели (F/T)</div></div>
        <div class="class-btn" data-class="pyro">🔥 Пиромант<div class="desc">Огнемёт, Кольцо огня</div></div>
        <div class="class-btn" data-class="berserk">⚡ Берсерк<div class="desc">Deagle, Ярость</div></div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 600;
        canvas.width = W;
        canvas.height = H;

        // ==================== СОСТОЯНИЕ ====================
        let game = {
            running: false, paused: false,
            helpOpen: false,
            player: null, zombies: [],
            bullets: [], particles: [],
            explosions: [], grenades: [], c4s: [],
            turrets: [], rockets: [],
            enemyBullets: [],
            wave: 1, zombiesToSpawn: 5, zombiesAlive: 0,
            kills: 0, money: 0,
            damageCooldown: 0, invincibleTimer: 0,
            shakeAmount: 0, damageFlash: 0,
            mouseX: W/2, mouseY: H/2,
            keys: {}, shopOpen: false, shopTab: 'items',
            classChosen: null,
            grenadeCount: 0, c4Count: 0,
            healpacks: 0, colaCount: 0, turretCount: 0,
            classType: null,
            shootTimer: 0,
            weapons: [], currentWeaponIndex: 0,
            speedBoostTimer: 0,
            reloadTimer: 0, reloading: false,
            playerBaseSpeed: null,
            abilityCooldown: 0,
            abilityMaxCooldown: 0,
            abilityDuration: 0,
            abilityActive: false,
            abilityBonus: null,
            maxHealthBonus: 0
        };

        // ==================== КЛАССЫ ====================
        const CLASSES = {
            soldier: { name: 'Солдат', health: 100, speed: 4, items: { healpacks: 1, grenades: 0, c4: 0, cola: 0, turrets: 0 }, weapons: ['m4a1'], regen: 0, color: '#4a7c4f', ability: 'dash', abilityCooldown: 8 },
            grenadier: { name: 'Гранадир', health: 100, speed: 4, items: { healpacks: 0, grenades: 10, c4: 1, cola: 0, turrets: 0 }, weapons: ['mp5'], regen: 0, color: '#8b5e3c', ability: 'grenadeSalvo', abilityCooldown: 15 },
            sniper: { name: 'Снайпер', health: 90, speed: 3, items: { healpacks: 0, grenades: 0, c4: 0, cola: 0, turrets: 0 }, weapons: ['awp'], regen: 0, color: '#3a5f6f', ability: 'markedShot', abilityCooldown: 12 },
            medic: { name: 'Медик', health: 130, speed: 4, items: { healpacks: 0, grenades: 0, c4: 0, cola: 0, turrets: 0 }, weapons: ['glock'], regen: 0.5, color: '#b8b8b8', ability: 'heal', abilityCooldown: 20 },
            engineer: { name: 'Инженер', health: 100, speed: 4, items: { healpacks: 0, grenades: 0, c4: 0, cola: 0, turrets: 2 }, weapons: ['shotgun'], regen: 0, color: '#b8860b', ability: null, abilityCooldown: 0 },
            pyro: { name: 'Пиромант', health: 100, speed: 4, items: { healpacks: 0, grenades: 0, c4: 0, cola: 1, turrets: 0 }, weapons: ['flamethrower'], regen: 0, color: '#ff4500', ability: 'fireRing', abilityCooldown: 10 },
            berserk: { name: 'Берсерк', health: 110, speed: 4.5, items: { healpacks: 0, grenades: 0, c4: 0, cola: 0, turrets: 0 }, weapons: ['deagle'], regen: 0, color: '#cc0000', ability: 'rage', abilityCooldown: 18 }
        };

        // ==================== ОРУЖИЕ ====================
        const WEAPONS = {
            glock:   { name:'Glock',        type:'hitscan', damage:1,   fireRate:0.28, magSize:15, reloadTime:1.2, pellets:1, speed:12, radius:2, color:'#ffaa00', piercing:0, recoil:0.02, price:0 },
            deagle:  { name:'Desert Eagle', type:'hitscan', damage:4,   fireRate:0.7,  magSize:7,  reloadTime:2.0, pellets:1, speed:14, radius:3, color:'#ff8800', piercing:1, recoil:0.1,  price:250 },
            m4a1:    { name:'M4A1',         type:'hitscan', damage:1.2, fireRate:0.12, magSize:30, reloadTime:2.5, pellets:1, speed:13, radius:2.5, color:'#ffcc00', piercing:0, recoil:0.04, price:300 },
            acr:     { name:'ACR',          type:'hitscan', damage:1.5, fireRate:0.14, magSize:25, reloadTime:2.2, pellets:1, speed:14, radius:2.5, color:'#ddff00', piercing:0, recoil:0.03, price:350 },
            mp5:     { name:'MP5',          type:'hitscan', damage:0.9, fireRate:0.08, magSize:40, reloadTime:2.0, pellets:1, speed:11, radius:2, color:'#aaffaa', piercing:0, recoil:0.06, price:200 },
            shotgun: { name:'SPAS-12',      type:'hitscan', damage:1.8, fireRate:0.8,  magSize:8,  reloadTime:3.0, pellets:5, speed:10, radius:3, color:'#ff6666', piercing:0, recoil:0.15, price:400 },
            awp:     { name:'AWP',          type:'hitscan', damage:6,   fireRate:1.5,  magSize:5,  reloadTime:3.5, pellets:1, speed:25, radius:3, color:'#ff4444', piercing:3, recoil:0.2,  price:500 },
            flamethrower: { name:'Огнемёт',  type:'flame',  damage:0.6, fireRate:0.05, magSize:100, reloadTime:2.0, pellets:1, speed:6, radius:8, color:'#ff6600', piercing:0, recoil:0.1,  price:0 },
            flamethrower_shop: { name:'Огнемёт (маг.)', type:'flame', damage:0.6, fireRate:0.05, magSize:100, reloadTime:2.0, pellets:1, speed:6, radius:4, color:'#ff6600', piercing:0, recoil:0.1, price:450 },
            rpg:     { name:'РПГ-7',        type:'rocket', damage:10, fireRate:1.5, magSize:1, reloadTime:3.0, pellets:1, speed:8, radius:6, color:'#ff4400', piercing:0, recoil:0.0, price:600, explosionRadius:100 },
            machete: { name:'Мачете',       type:'melee', damage:5, fireRate:0.5, magSize:Infinity, reloadTime:0, pellets:1, speed:0, radius:35, color:'#cccccc', piercing:0, recoil:0, price:200, meleeRange:40 },
            katana:  { name:'Катана',       type:'melee', damage:7, fireRate:0.6, magSize:Infinity, reloadTime:0, pellets:1, speed:0, radius:40, color:'#silver', piercing:0, recoil:0, price:400, meleeRange:50, deflect:true }
        };

        // ==================== ИГРОК ====================
        class Player {
            constructor(cls) {
                const data = CLASSES[cls];
                this.classType = cls;
                this.health = data.health;
                this.maxHealth = data.health;
                this.baseSpeed = data.speed;
                this.speed = data.speed;
                this.x = W/2; this.y = H/2;
                this.radius = 18;
                this.regen = data.regen;
                this.color = data.color;
                this.ability = data.ability;
                this.abilityCooldownMax = data.abilityCooldown;
            }
            getCurrentWeapon() {
                const wp = game.weapons[game.currentWeaponIndex];
                return wp ? { ...WEAPONS[wp.key], ammo: wp.ammo } : null;
            }
            update() {
                let dx = 0, dy = 0;
                if (game.keys['KeyW']) dy -= 1;
                if (game.keys['KeyS']) dy += 1;
                if (game.keys['KeyA']) dx -= 1;
                if (game.keys['KeyD']) dx += 1;
                if (dx !== 0 || dy !== 0) {
                    const len = Math.sqrt(dx*dx + dy*dy);
                    dx /= len; dy /= len;
                    this.x += dx * this.speed;
                    this.y += dy * this.speed;
                }
                this.x = Math.max(this.radius, Math.min(W - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(H - this.radius, this.y));
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                const angle = Math.atan2(game.mouseY - this.y, game.mouseX - this.x);
                ctx.rotate(angle);
                ctx.fillStyle = this.color || '#2d5a27';
                ctx.fillRect(-8, -6, 20, 12);
                ctx.fillStyle = '#f5cba7';
                ctx.beginPath(); ctx.arc(12, 0, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#333';
                ctx.fillRect(14, -3, 18, 4);
                ctx.restore();
                if (game.invincibleTimer > 0 && Math.floor(game.invincibleTimer * 10) % 2 === 0) {
                    ctx.strokeStyle = 'rgba(255,0,0,0.8)';
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius+2, 0, Math.PI*2); ctx.stroke();
                }
                if (game.abilityActive && game.abilityBonus?.type === 'rage') {
                    ctx.strokeStyle = 'rgba(255,0,0,0.6)';
                    ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius+5, 0, Math.PI*2); ctx.stroke();
                }
            }
        }

        // ==================== ТУРЕЛЬ ====================
        class Turret {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 10; this.health = 100; this.shootTimer = 0; }
            update() {
                if (this.shootTimer > 0) this.shootTimer -= 1/60;
                let closest = null, minDist = 150;
                for (let z of game.zombies) {
                    const d = Math.hypot(this.x - z.x, this.y - z.y);
                    if (d < minDist) { minDist = d; closest = z; }
                }
                if (closest && this.shootTimer <= 0) {
                    this.shootTimer = 0.4;
                    const angle = Math.atan2(closest.y - this.y, closest.x - this.x);
                    game.bullets.push(new Bullet(this.x, this.y, angle, { damage: 1.5, speed: 10, radius: 2, color: '#ffaa00', piercing: 0, isFlame: false }));
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#aaa'; ctx.fillRect(this.x-10, this.y-10, 20, 20);
                ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(this.x, this.y-14, 5, 0, 2*Math.PI); ctx.fill();
            }
        }

        // ==================== ЗОМБИ ====================
        class Zombie {
            constructor() {
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: this.x = Math.random() * W; this.y = -20; break;
                    case 1: this.x = W + 20; this.y = Math.random() * H; break;
                    case 2: this.x = Math.random() * W; this.y = H + 20; break;
                    case 3: this.x = -20; this.y = Math.random() * H; break;
                }
                this.radius = 16;
                this.speed = 1.0 + game.wave * 0.15;
                this.health = 3 + game.wave;
                this.maxHealth = this.health;
                this.wobble = Math.random() * Math.PI * 2;
                this.burning = 0;
                this.boss = false;
            }
            update() {
                const p = game.player;
                const dx = p.x - this.x, dy = p.y - this.y, dist = Math.sqrt(dx*dx+dy*dy);
                if (dist > 0) { this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed; }
                this.wobble += 0.05;
                if (this.burning > 0) {
                    this.burning -= 1/60;
                    this.health -= 3 * (1/60);
                    if (Math.random() < 0.3) {
                        game.particles.push(new Particle(
                            this.x + (Math.random()-0.5)*20, this.y - 10,
                            (Math.random()-0.5)*0.5, -Math.random()*2 - 1,
                            'rgb(255,100,0,1)', 3+Math.random()*4, 15+Math.random()*20
                        ));
                    }
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.translate(Math.sin(this.wobble)*3, 0);
                ctx.fillStyle = this.burning > 0 ? '#8b4500' : '#3b5e2b';
                ctx.fillRect(-10,-8,20,18);
                ctx.fillStyle = this.burning > 0 ? '#cc5500' : '#5a8f4a';
                ctx.beginPath(); ctx.arc(0,-12,7,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillRect(-4,-14,2,2); ctx.fillRect(2,-14,2,2);
                ctx.fillStyle = 'black'; ctx.fillRect(-3,-13,1,1); ctx.fillRect(3,-13,1,1);
                ctx.fillStyle = '#8b0000'; ctx.fillRect(-5,-8,3,2);
                ctx.restore();
                this.drawHealthBar(ctx);
            }
            drawHealthBar(ctx) {
                if (this.health >= this.maxHealth) return;
                const barW = this.boss ? 50 : 30, barH = 4;
                const x = this.x - barW/2, y = this.y - (this.boss ? 35 : 25);
                ctx.fillStyle = 'red';
                ctx.fillRect(x, y, barW, barH);
                const pct = Math.max(0, this.health / this.maxHealth);
                ctx.fillStyle = this.boss ? '#ffaa00' : '#0f0';
                ctx.fillRect(x, y, barW * pct, barH);
            }
        }

        class ShootingZombie extends Zombie {
            constructor() {
                super();
                this.shootTimer = 2 + Math.random() * 3;
                this.radius = 18;
                this.health = 4 + game.wave;
                this.maxHealth = this.health;
                this.boss = false;
            }
            update() {
                super.update();
                this.shootTimer -= 1/60;
                if (this.shootTimer <= 0 && game.player) {
                    this.shootTimer = 2 + Math.random() * 3;
                    const angle = Math.atan2(game.player.y - this.y, game.player.x - this.x);
                    game.enemyBullets.push(new EnemyBullet(this.x, this.y, angle));
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.translate(Math.sin(this.wobble)*3, 0);
                ctx.fillStyle = this.burning > 0 ? '#8b4500' : '#4a1a2e';
                ctx.fillRect(-11,-9,22,20);
                ctx.fillStyle = this.burning > 0 ? '#cc5500' : '#8b0045';
                ctx.beginPath(); ctx.arc(0,-14,8,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillRect(-5,-16,2,2); ctx.fillRect(3,-16,2,2);
                ctx.fillStyle = '#ff0'; ctx.fillRect(-6,-20,4,6); ctx.fillRect(2,-20,4,6);
                ctx.restore();
                this.drawHealthBar(ctx);
            }
        }

        class BossZombie extends Zombie {
            constructor() {
                super();
                this.radius = 30;
                this.speed = 0.8 + game.wave * 0.08;
                this.health = 50 + game.wave * 15;
                this.maxHealth = this.health;
                this.boss = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.translate(Math.sin(this.wobble)*5, 0);
                ctx.fillStyle = this.burning > 0 ? '#5a2d0c' : '#4a2b1a';
                ctx.fillRect(-20,-16,40,36);
                ctx.fillStyle = this.burning > 0 ? '#993d00' : '#6b4a3a';
                ctx.beginPath(); ctx.arc(0,-24,14,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff0'; ctx.fillRect(-6,-28,4,4); ctx.fillRect(2,-28,4,4);
                ctx.fillStyle = '#000'; ctx.fillRect(-5,-27,2,2); ctx.fillRect(3,-27,2,2);
                ctx.fillStyle = '#555';
                ctx.fillRect(-15,-40,6,16); ctx.fillRect(9,-40,6,16);
                ctx.restore();
                this.drawHealthBar(ctx);
            }
        }

        // ==================== ВРАЖЕСКАЯ ПУЛЯ ====================
        class EnemyBullet {
            constructor(x, y, angle) {
                this.x = x; this.y = y;
                const speed = 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.radius = 3;
                this.damage = 12;
                this.isEnemy = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x<0||this.x>W||this.y<0||this.y>H) this.life = 0;
            }
            draw(ctx) {
                ctx.fillStyle = this.isEnemy ? '#ff0000' : '#00ff00';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, 2*Math.PI); ctx.fill();
            }
        }

        // ==================== ПУЛЯ ИГРОКА ====================
        class Bullet {
            constructor(x, y, angle, weapon) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * weapon.speed;
                this.vy = Math.sin(angle) * weapon.speed;
                this.life = 1; this.radius = weapon.radius || 2;
                this.damage = weapon.damage;
                this.piercing = weapon.piercing || 0;
                this.hitZombies = [];
                this.color = weapon.color || '#ff0';
                this.isFlame = weapon.isFlame || false;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x<-10||this.x>W+10||this.y<-10||this.y>H+10) this.life = 0;
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.isFlame ? 12 : 6;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ==================== РАКЕТА (РПГ) ====================
        class Rocket {
            constructor(x, y, angle, damage, explosionRadius) {
                this.x = x; this.y = y;
                const speed = 8;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.damage = damage;
                this.explosionRadius = explosionRadius;
                this.radius = 5;
                this.trail = [];
            }
            update() {
                this.trail.push({x: this.x, y: this.y, life: 0.2});
                this.x += this.vx;
                this.y += this.vy;
                for (let i = this.trail.length-1; i >=0; i--) {
                    this.trail[i].life -= 1/60;
                    if (this.trail[i].life <= 0) this.trail.splice(i,1);
                }
                for (let z of game.zombies) {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < z.radius + this.radius) {
                        this.explode();
                        return;
                    }
                }
                if (this.x < -20 || this.x > W+20 || this.y < -20 || this.y > H+20) {
                    this.explode();
                }
            }
            explode() {
                this.life = 0;
                game.explosions.push(new Explosion(this.x, this.y, this.explosionRadius, 1.5));
                spawnBlood(this.x, this.y, 20);
                for (let z of game.zombies) {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < this.explosionRadius) {
                        z.health -= 40;
                        z.burning = 2.0;
                    }
                }
                if (game.player && Math.hypot(this.x - game.player.x, this.y - game.player.y) < this.explosionRadius) {
                    damagePlayer(this.damage * 0.8);
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                const angle = Math.atan2(this.vy, this.vx);
                ctx.rotate(angle);
                ctx.fillStyle = '#666';
                ctx.fillRect(-10, -4, 20, 8);
                ctx.fillStyle = '#ff4400';
                ctx.beginPath(); ctx.arc(10, 0, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff0';
                ctx.beginPath(); ctx.arc(-10, 0, 3, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                for (let t of this.trail) {
                    ctx.fillStyle = 'rgba(255,100,0,0.5)';
                    ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, 2*Math.PI); ctx.fill();
                }
            }
        }

        // ==================== ГРАНАТА / C4 / ВЗРЫВ ====================
        class Grenade {
            constructor(x, y, angle) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * 6; this.vy = Math.sin(angle) * 6;
                this.life = 1; this.radius = 6; this.timer = 2.0;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.98; this.vy *= 0.98;
                this.timer -= 1/60;
                if (this.timer <= 0) this.explode();
                for (let z of game.zombies) {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < this.radius + z.radius) {
                        this.explode(); break;
                    }
                }
                if (this.x<0||this.x>W||this.y<0||this.y>H) this.life = 0;
            }
            explode() {
                this.life = 0;
                game.explosions.push(new Explosion(this.x, this.y, 80, 1));
                spawnBlood(this.x, this.y, 20);
                for (let z of game.zombies) {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < 80) {
                        z.health -= 25;
                    }
                }
                if (game.player && Math.hypot(this.x - game.player.x, this.y - game.player.y) < 80) damagePlayer(25);
            }
            draw(ctx) {
                ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 2*Math.PI); ctx.fill();
            }
        }
        class C4 {
            constructor(x, y) { this.x = x; this.y = y; this.life = 1; this.timer = 5.0; }
            update() { this.timer -= 1/60; if (this.timer <= 0) this.explode(); }
            explode() {
                this.life = 0;
                game.explosions.push(new Explosion(this.x, this.y, 120, 2));
                spawnBlood(this.x, this.y, 40);
                for (let z of game.zombies) {
                    if (Math.hypot(this.x - z.x, this.y - z.y) < 120) {
                        z.health -= 60;
                    }
                }
                if (game.player && Math.hypot(this.x - game.player.x, this.y - game.player.y) < 120) damagePlayer(40);
            }
            draw(ctx) {
                const blink = Math.sin(Date.now()*0.02) > 0;
                ctx.fillStyle = blink ? '#888' : '#444'; ctx.fillRect(this.x-12, this.y-12, 24, 24);
                ctx.fillStyle = 'red'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
                ctx.fillText('C4', this.x, this.y+6);
            }
        }
        class Explosion {
            constructor(x, y, maxRadius, duration) {
                this.x = x; this.y = y; this.radius = 0; this.maxRadius = maxRadius;
                this.duration = duration; this.life = duration;
            }
            update() { this.radius += (this.maxRadius / this.duration) / 60; this.life -= 1/60; }
            draw(ctx) {
                const alpha = this.life / this.duration;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(255,100,0,${alpha})`; ctx.fill();
                ctx.strokeStyle = `rgba(255,200,0,${alpha})`; ctx.lineWidth = 2; ctx.stroke();
            }
            isDead() { return this.life <= 0; }
        }
        class Particle {
            constructor(x, y, vx, vy, color, size, life) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.color = color; this.size = size; this.life = life; this.maxLife = life;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.98; this.vy *= 0.98; this.life--; }
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = this.color.replace('1)', `${alpha})`).replace('rgb', 'rgba');
                ctx.fillRect(this.x, this.y, this.size * alpha, this.size * alpha);
            }
            isDead() { return this.life <= 0; }
        }

        function spawnBlood(x, y, count=12) {
            for (let i=0; i<count; i++) {
                const a = Math.random()*2*Math.PI, sp = 2+Math.random()*4;
                game.particles.push(new Particle(x, y, Math.cos(a)*sp, Math.sin(a)*sp, 'rgb(200,0,0,1)', 2+Math.random()*4, 20+Math.random()*30));
            }
        }
        function damagePlayer(amount) {
            if (!game.running || game.invincibleTimer > 0) return;
            game.player.health -= amount;
            game.invincibleTimer = 1.5; game.shakeAmount = 8; game.damageFlash = 0.3;
            if (game.player.health <= 0) {
                game.player.health = 0; game.running = false;
                document.getElementById('classOverlay').classList.add('active');
            }
        }

        function startWave() {
            const wave = game.wave;
            game.zombiesToSpawn = 4 + wave * 2;
            game.zombiesAlive = 0;
            for (let i=0; i<game.zombiesToSpawn; i++) {
                if (wave >= 3 && Math.random() < 0.2) {
                    game.zombies.push(new ShootingZombie());
                } else {
                    game.zombies.push(new Zombie());
                }
                game.zombiesAlive++;
            }
            if (wave % 5 === 0) {
                game.zombies.push(new BossZombie());
                game.zombiesAlive++;
            }
        }

        function resetGame(className) {
            const data = CLASSES[className];
            game.classType = className;
            game.player = new Player(className);
            game.zombies = []; game.bullets = []; game.particles = [];
            game.grenades = []; game.c4s = []; game.explosions = [];
            game.turrets = []; game.rockets = []; game.enemyBullets = [];
            game.wave = 1; game.kills = 0; game.money = 0;
            game.damageCooldown = 0; game.invincibleTimer = 0;
            game.shakeAmount = 0; game.damageFlash = 0;
            game.running = true; game.paused = false; game.shopOpen = false;
            game.helpOpen = false;
            game.speedBoostTimer = 0; game.reloadTimer = 0; game.reloading = false;
            game.healpacks = data.items.healpacks;
            game.colaCount = data.items.cola;
            game.grenadeCount = data.items.grenades;
            game.c4Count = data.items.c4;
            game.turretCount = data.items.turrets;
            game.weapons = [];
            data.weapons.forEach(wKey => game.weapons.push({ key: wKey, ammo: WEAPONS[wKey].magSize }));
            game.currentWeaponIndex = 0;
            game.playerBaseSpeed = null;
            game.abilityCooldown = 0;
            game.abilityMaxCooldown = game.player.abilityCooldownMax;
            game.abilityDuration = 0;
            game.abilityActive = false;
            game.abilityBonus = null;
            game.maxHealthBonus = 0;
            startWave();
        }

        function useAbility() {
            const p = game.player;
            if (!p || game.abilityCooldown > 0 || game.abilityActive || game.paused) return;
            switch(p.ability) {
                case 'dash':
                    const angle = Math.atan2(game.mouseY - p.y, game.mouseX - p.x);
                    p.x += Math.cos(angle) * 100;
                    p.y += Math.sin(angle) * 100;
                    p.x = Math.max(p.radius, Math.min(W - p.radius, p.x));
                    p.y = Math.max(p.radius, Math.min(H - p.radius, p.y));
                    game.invincibleTimer = Math.max(game.invincibleTimer, 1.0);
                    game.abilityCooldown = 8;
                    break;
                case 'grenadeSalvo':
                    const baseAngle = Math.atan2(game.mouseY - p.y, game.mouseX - p.x);
                    for (let i = -1; i <= 1; i++) game.grenades.push(new Grenade(p.x, p.y, baseAngle + i * 0.3));
                    game.abilityCooldown = 15;
                    break;
                case 'markedShot':
                    game.abilityActive = true; game.abilityDuration = 3;
                    game.abilityBonus = { type: 'markedShot', multDmg: 3, pierce: 10 };
                    game.abilityCooldown = 12;
                    break;
                case 'heal':
                    p.health = Math.min(p.maxHealth + game.maxHealthBonus, p.health + 40);
                    game.abilityCooldown = 20;
                    break;
                case 'fireRing':
                    for (let i=0; i<40; i++) game.particles.push(new Particle(p.x, p.y, Math.cos(i/40*2*Math.PI)*3, Math.sin(i/40*2*Math.PI)*3, 'rgb(255,100,0,1)', 5, 15));
                    for (let z of game.zombies) {
                        if (Math.hypot(p.x - z.x, p.y - z.y) < 90) {
                            z.burning = 3.0;
                            z.health -= 5;
                        }
                    }
                    game.abilityCooldown = 10;
                    break;
                case 'rage':
                    game.abilityActive = true; game.abilityDuration = 5;
                    game.abilityBonus = { type: 'rage', multDmg: 1.5, vamp: 5 };
                    game.player.speed = game.player.baseSpeed * 1.3;
                    game.abilityCooldown = 18;
                    break;
            }
            game.abilityMaxCooldown = game.abilityCooldown;
        }

        function placeTurret() {
            const p = game.player;
            if (!p || game.turretCount <= 0 || game.turrets.length >= 5 || game.paused) return;
            game.turrets.push(new Turret(p.x, p.y));
            game.turretCount--;
        }

        function pickUpTurret() {
            const p = game.player;
            if (!p || game.paused) return;
            const pickRange = 50;
            let closestDist = pickRange;
            let closestIndex = -1;
            for (let i = 0; i < game.turrets.length; i++) {
                const t = game.turrets[i];
                const d = Math.hypot(p.x - t.x, p.y - t.y);
                if (d < closestDist) {
                    closestDist = d;
                    closestIndex = i;
                }
            }
            if (closestIndex !== -1) {
                game.turrets.splice(closestIndex, 1);
                game.turretCount++;
            }
        }

        function meleeAttack(weaponData) {
            const p = game.player;
            const angle = Math.atan2(game.mouseY - p.y, game.mouseX - p.x);
            const range = weaponData.meleeRange || 40;
            for (let z of game.zombies) {
                const dist = Math.hypot(z.x - p.x, z.y - p.y);
                const angleToZ = Math.atan2(z.y - p.y, z.x - p.x);
                let diff = angleToZ - angle;
                while (diff > Math.PI) diff -= 2*Math.PI;
                while (diff < -Math.PI) diff += 2*Math.PI;
                if (dist < range && Math.abs(diff) < Math.PI/2.5) {
                    z.health -= weaponData.damage;
                    spawnBlood(z.x, z.y, 5);
                }
            }
            if (weaponData.deflect) {
                const deflectRange = 60;
                for (let i = game.enemyBullets.length-1; i >= 0; i--) {
                    const b = game.enemyBullets[i];
                    if (!b.isEnemy) continue;
                    const dist = Math.hypot(b.x - p.x, b.y - p.y);
                    if (dist < deflectRange) {
                        b.isEnemy = false;
                        let closestZ = null, minD = 300;
                        for (let z of game.zombies) {
                            const d = Math.hypot(b.x - z.x, b.y - z.y);
                            if (d < minD) { minD = d; closestZ = z; }
                        }
                        if (closestZ) {
                            const a = Math.atan2(closestZ.y - b.y, closestZ.x - b.x);
                            b.vx = Math.cos(a) * 7;
                            b.vy = Math.sin(a) * 7;
                        } else {
                            b.vx *= -1.2;
                            b.vy *= -1.2;
                        }
                    }
                }
            }
            for (let i=0; i<8; i++) {
                const a = angle + (Math.random()-0.5)*0.8;
                game.particles.push(new Particle(p.x + Math.cos(angle)*15, p.y + Math.sin(angle)*15,
                    Math.cos(a)*2, Math.sin(a)*2, 'rgb(200,200,200,1)', 3, 10));
            }
        }

        function update() {
            if (!game.running || game.paused) return;
            if (game.abilityCooldown > 0) game.abilityCooldown -= 1/60;
            if (game.abilityActive && game.abilityDuration > 0) {
                game.abilityDuration -= 1/60;
                if (game.abilityDuration <= 0) {
                    game.abilityActive = false;
                    if (game.abilityBonus?.type === 'rage') game.player.speed = game.player.baseSpeed;
                    game.abilityBonus = null;
                }
            }
            if (game.speedBoostTimer > 0) {
                game.speedBoostTimer -= 1/60;
                if (game.speedBoostTimer <= 0) { game.speedBoostTimer = 0; if (game.player) game.player.speed = game.player.baseSpeed; }
            }
            if (game.invincibleTimer > 0) game.invincibleTimer -= 1/60;
            if (game.shakeAmount > 0) game.shakeAmount *= 0.9;
            if (game.damageFlash > 0) game.damageFlash -= 0.02;
            if (game.damageCooldown > 0) game.damageCooldown -= 1/60;
            if (game.player.regen > 0) game.player.health = Math.min(game.player.maxHealth + game.maxHealthBonus, game.player.health + game.player.regen / 60);
            if (game.reloading) {
                game.reloadTimer -= 1/60;
                if (game.reloadTimer <= 0) {
                    const wp = game.weapons[game.currentWeaponIndex];
                    wp.ammo = WEAPONS[wp.key].magSize;
                    game.reloading = false;
                }
            }
            game.player.update();
            game.turrets.forEach(t => t.update());
            game.zombies.forEach(z => z.update());
            game.rockets.forEach(r => r.update());
            game.rockets = game.rockets.filter(r => r.life > 0);
            game.enemyBullets.forEach(b => b.update());
            game.enemyBullets = game.enemyBullets.filter(b => b.life > 0);

            for (let i = game.enemyBullets.length-1; i >= 0; i--) {
                const b = game.enemyBullets[i];
                if (!b.isEnemy) continue;
                if (game.player && Math.hypot(b.x - game.player.x, b.y - game.player.y) < game.player.radius + b.radius) {
                    damagePlayer(b.damage);
                    b.life = 0;
                }
            }

            if (game.damageCooldown <= 0 && game.invincibleTimer <= 0) {
                for (let z of game.zombies) {
                    if (Math.hypot(z.x - game.player.x, z.y - game.player.y) < game.player.radius + z.radius) {
                        damagePlayer(z.boss ? 35 : 20);
                        game.damageCooldown = 1.0;
                        break;
                    }
                }
            }
            game.bullets.forEach(b => b.update());
            game.bullets = game.bullets.filter(b => b.life > 0);
            for (let i = game.bullets.length-1; i >= 0; i--) {
                const b = game.bullets[i];
                for (let j = game.zombies.length-1; j >= 0; j--) {
                    const z = game.zombies[j];
                    if (b.hitZombies.includes(j)) continue;
                    if (Math.hypot(b.x - z.x, b.y - z.y) < z.radius + b.radius) {
                        z.health -= b.damage;
                        if (b.isFlame) z.burning = 3.0;
                        b.hitZombies.push(j);
                        if (b.piercing <= 0) { game.bullets.splice(i,1); break; }
                        else b.piercing--;
                    }
                }
            }
            for (let i = game.enemyBullets.length-1; i >= 0; i--) {
                const b = game.enemyBullets[i];
                if (b.isEnemy) continue;
                for (let j = game.zombies.length-1; j >= 0; j--) {
                    const z = game.zombies[j];
                    if (Math.hypot(b.x - z.x, b.y - z.y) < z.radius + b.radius) {
                        z.health -= 5;
                        b.life = 0;
                        break;
                    }
                }
            }

            for (let j = game.zombies.length-1; j >= 0; j--) {
                if (game.zombies[j].health <= 0) {
                    const z = game.zombies[j];
                    spawnBlood(z.x, z.y, z.boss ? 30 : 15);
                    if (game.abilityActive && game.abilityBonus?.type === 'rage' && game.abilityBonus.vamp) {
                        game.player.health = Math.min(game.player.maxHealth + game.maxHealthBonus, game.player.health + game.abilityBonus.vamp);
                    }
                    game.zombies.splice(j,1);
                    game.kills++; game.money += z.boss ? 200 : 25; game.zombiesAlive--;
                }
            }
            game.grenades.forEach(g => g.update()); game.grenades = game.grenades.filter(g => g.life > 0);
            game.c4s.forEach(c => c.update()); game.c4s = game.c4s.filter(c => c.life > 0);
            game.explosions.forEach(e => e.update()); game.explosions = game.explosions.filter(e => !e.isDead());
            game.particles.forEach(p => p.update()); game.particles = game.particles.filter(p => !p.isDead());
            if (game.zombiesAlive <= 0 && game.zombies.length === 0) { game.wave++; startWave(); }
        }

        function shootWeapon() {
            if (!game.player || game.reloading) return;
            let wp = game.player.getCurrentWeapon();
            if (!wp) return;
            if (wp.ammo <= 0 && wp.type !== 'melee') {
                if (!game.reloading && wp) {
                    game.reloading = true;
                    game.reloadTimer = WEAPONS[game.weapons[game.currentWeaponIndex].key].reloadTime;
                }
                return;
            }
            if (game.shootTimer > 0) return;
            let dmgMult = 1, pierceBonus = 0;
            if (game.abilityActive && game.abilityBonus) {
                if (game.abilityBonus.type === 'markedShot') { dmgMult = game.abilityBonus.multDmg; pierceBonus = game.abilityBonus.pierce; }
                else if (game.abilityBonus.type === 'rage') dmgMult = game.abilityBonus.multDmg;
            }

            game.shootTimer = wp.fireRate;
            if (wp.type !== 'melee') game.weapons[game.currentWeaponIndex].ammo--;

            const angle = Math.atan2(game.mouseY - game.player.y, game.mouseX - game.player.x);
            const bx = game.player.x + Math.cos(angle)*25, by = game.player.y + Math.sin(angle)*25;
            const spread = wp.recoil || 0.05;

            if (wp.type === 'melee') {
                meleeAttack(wp);
                return;
            }
            if (wp.type === 'rocket') {
                game.rockets.push(new Rocket(bx, by, angle, wp.damage * dmgMult, wp.explosionRadius || 100));
                return;
            }
            const bulletData = {
                damage: wp.damage * dmgMult, speed: wp.speed, radius: wp.radius,
                color: wp.color, piercing: (wp.piercing || 0) + pierceBonus, isFlame: wp.type === 'flame'
            };
            if (wp.type === 'flame') {
                for (let i=0; i<3; i++) {
                    const a = angle + (Math.random()-0.5)*spread*2;
                    game.bullets.push(new Bullet(bx, by, a, bulletData));
                }
            } else {
                for (let i=0; i<(wp.pellets||1); i++) {
                    const a = angle + (Math.random()-0.5)*spread*(wp.pellets>1?2:1);
                    game.bullets.push(new Bullet(bx, by, a, bulletData));
                }
            }
            for (let i=0; i<5; i++) {
                const a = angle + (Math.random()-0.5)*0.3;
                game.particles.push(new Particle(bx, by, Math.cos(a)*4, Math.sin(a)*4, 'rgb(255,255,100,1)', 2, 6));
            }
        }

        // ==================== МАГАЗИН ====================
        const shopItems = [
            { name: 'Аптечка (+30)', cost: 50, action: () => { game.healpacks++; } },
            { name: 'Большая аптечка (+60)', cost: 120, action: () => { game.healpacks += 2; } },
            { name: 'Граната', cost: 75, action: () => { game.grenadeCount++; } },
            { name: 'C4', cost: 150, action: () => { game.c4Count++; } },
            { name: 'Спид-кола', cost: 50, action: () => { game.colaCount++; } },
            { name: 'Турель', cost: 100, action: () => { game.turretCount++; } },
            { name: 'Бронежилет (+25 макс. HP)', cost: 200, action: () => { 
                game.maxHealthBonus += 25; 
                game.player.maxHealth += 25;
                game.player.health = Math.min(game.player.health + 25, game.player.maxHealth);
            }}
        ];
        function getShopWeapons() {
            return Object.entries(WEAPONS).filter(([key,w]) => w.price > 0 && w.type !== 'melee').map(([key,w]) => ({
                key, name: w.name, cost: w.price,
                stats: `Урон:${w.damage} Скор:${(1/w.fireRate).toFixed(1)}/с Отдача:${Math.round(w.recoil*100)}% Перезар:${w.reloadTime}с Маг:${w.magSize}`,
                action: () => { if (!game.weapons.find(wp => wp.key === key)) game.weapons.push({ key, ammo: w.magSize }); }
            }));
        }
        function getShopMelee() {
            return Object.entries(WEAPONS).filter(([key,w]) => w.type === 'melee' && w.price > 0).map(([key,w]) => ({
                key, name: w.name, cost: w.price,
                stats: `Урон:${w.damage} Дальность:${w.meleeRange} Скор:${(1/w.fireRate).toFixed(1)}/с ${w.deflect?'🛡️Отражение':''}`,
                action: () => { if (!game.weapons.find(wp => wp.key === key)) game.weapons.push({ key, ammo: Infinity }); }
            }));
        }

        function buyItem(index) {
            const item = shopItems[index];
            if (!item || game.money < item.cost) return;
            game.money -= item.cost; item.action();
        }
        function buyWeapon(weaponObj) {
            if (!weaponObj || game.money < weaponObj.cost) return;
            game.money -= weaponObj.cost; weaponObj.action();
        }

        // ==================== ОТРИСОВКА ИНВЕНТАРЯ ====================
        function drawInventoryBar() {
            const barY = 530;
            const barH = 70;
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, barY, W, barH);

            const slotW = 120;
            const slotH = 50;
            const startX = 30;
            const slotY = barY + 10;
            for (let i = 0; i < 3; i++) {
                const x = startX + i * (slotW + 10);
                ctx.fillStyle = '#222';
                ctx.fillRect(x, slotY, slotW, slotH);
                if (i === game.currentWeaponIndex) {
                    ctx.strokeStyle = '#ffcc00';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, slotY, slotW, slotH);
                }
                if (game.weapons[i]) {
                    const w = WEAPONS[game.weapons[i].key];
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px Arial';
                    ctx.fillText(w.name, x + 5, slotY + 20);
                    const ammoText = w.magSize === Infinity ? '∞' : `${game.weapons[i].ammo}/${w.magSize}`;
                    ctx.fillText(ammoText, x + 5, slotY + 40);
                } else {
                    ctx.fillStyle = '#555';
                    ctx.font = '14px Arial';
                    ctx.fillText(`Слот ${i+1}`, x + 5, slotY + 30);
                }
            }

            const itemsStartX = 440;
            const items = [
                { icon: '❤️', count: game.healpacks, key: 'H' },
                { icon: '🔵', count: game.colaCount, key: 'V' },
                { icon: '💣', count: game.grenadeCount, key: 'G' },
                { icon: '🧨', count: game.c4Count, key: 'C' },
                { icon: '🔫', count: game.turretCount, key: 'F' }
            ];
            items.forEach((item, i) => {
                const x = itemsStartX + i * 55;
                ctx.fillStyle = '#333';
                ctx.fillRect(x, slotY, 45, 50);
                ctx.font = '22px Arial';
                ctx.fillText(item.icon, x + 10, slotY + 25);
                ctx.font = 'bold 12px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText(item.count, x + 30, slotY + 42);
                ctx.fillStyle = '#aaa';
                ctx.fillText(item.key, x + 5, slotY + 48);
            });
        }

        // ==================== ОТРИСОВКА ====================
        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.save();
            if (game.shakeAmount > 0.5) {
                const dx = (Math.random()-0.5)*game.shakeAmount, dy = (Math.random()-0.5)*game.shakeAmount;
                ctx.translate(dx, dy);
            }
            ctx.fillStyle = '#2b2b2b'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 0.5;
            for (let i=0; i<W; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
            for (let i=0; i<H; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

            game.turrets.forEach(t => t.draw(ctx));
            game.zombies.forEach(z => z.draw(ctx));
            game.bullets.forEach(b => b.draw(ctx));
            game.rockets.forEach(r => r.draw(ctx));
            game.grenades.forEach(g => g.draw(ctx));
            game.c4s.forEach(c => c.draw(ctx));
            game.explosions.forEach(e => e.draw(ctx));
            game.enemyBullets.forEach(b => b.draw(ctx));
            if (game.player) game.player.draw(ctx);
            game.particles.forEach(p => p.draw(ctx));
            ctx.restore();

            if (game.damageFlash > 0) {
                ctx.fillStyle = `rgba(255,0,0,${game.damageFlash*0.5})`; ctx.fillRect(0,0,W,H);
            }

            ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial';
            ctx.fillText(`❤️ ${Math.ceil(game.player?.health||0)}/${game.player?.maxHealth||0}`, 20, 30);
            ctx.fillText(`Волна: ${game.wave}`, 20, 55);
            ctx.fillText(`💰 ${game.money}`, 20, 80);
            if (game.speedBoostTimer > 0) {
                ctx.fillStyle = '#00ffcc';
                ctx.fillText(`⚡ Спид: ${game.speedBoostTimer.toFixed(1)}с`, 20, 105);
            }
            ctx.fillStyle = 'white';
            let cdText = '';
            if (game.abilityCooldown > 0) cdText = ` [${game.abilityCooldown.toFixed(1)}с]`;
            ctx.fillText(`Умение (Q): ${game.player?.ability || ''}${cdText}`, 20, 130);
            ctx.fillText(`Класс: ${CLASSES[game.classType]?.name||''}`, W-200, 30);
            ctx.fillText(`B - магазин`, W-200, 50);
            ctx.fillText(`N - как играть`, W-200, 70);

            drawInventoryBar();

            if (game.paused && game.shopOpen) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
                ctx.fillStyle = 'white'; ctx.font = '28px Arial'; ctx.textAlign = 'center';
                ctx.fillText('МАГАЗИН', W/2, 50);
                ctx.font = '20px Arial';
                const tabs = [
                    { name: 'Предметы', tab: 'items', x: W/2 - 200 },
                    { name: 'Оружие', tab: 'weapons', x: W/2 },
                    { name: 'Ближний бой', tab: 'melee', x: W/2 + 200 }
                ];
                tabs.forEach(t => {
                    ctx.fillStyle = game.shopTab === t.tab ? '#ffcc00' : '#aaa';
                    ctx.fillText(t.name, t.x, 90);
                });

                if (game.shopTab === 'items') {
                    shopItems.forEach((item, i) => {
                        const y = 130 + i*40;
                        ctx.fillStyle = '#333'; ctx.fillRect(W/2-160, y-15, 320, 30);
                        ctx.fillStyle = 'white'; ctx.font = '16px Arial';
                        ctx.fillText(`${item.name} - ${item.cost}💰`, W/2, y+6);
                    });
                } else if (game.shopTab === 'weapons') {
                    const wps = getShopWeapons();
                    wps.forEach((wpn, i) => {
                        const y = 130 + i*40;
                        ctx.fillStyle = '#333'; ctx.fillRect(W/2-200, y-15, 400, 50);
                        ctx.fillStyle = 'white'; ctx.font = '16px Arial';
                        ctx.fillText(`${wpn.name} - ${wpn.cost}💰`, W/2, y);
                        ctx.font = '11px Arial'; ctx.fillStyle = '#ccc';
                        ctx.fillText(wpn.stats, W/2, y+18);
                    });
                } else if (game.shopTab === 'melee') {
                    const melee = getShopMelee();
                    melee.forEach((wpn, i) => {
                        const y = 130 + i*40;
                        ctx.fillStyle = '#333'; ctx.fillRect(W/2-200, y-15, 400, 50);
                        ctx.fillStyle = 'white'; ctx.font = '16px Arial';
                        ctx.fillText(`${wpn.name} - ${wpn.cost}💰`, W/2, y);
                        ctx.font = '11px Arial'; ctx.fillStyle = '#ccc';
                        ctx.fillText(wpn.stats, W/2, y+18);
                    });
                }
                ctx.fillStyle = 'white'; ctx.font = '16px Arial';
                ctx.fillText('Нажмите B для закрытия', W/2, 460);
                ctx.textAlign = 'start';
            }

            if (game.helpOpen) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
                ctx.fillText('📋 Управление', W/2, 50);
                const lines = [
                    'WASD – движение',
                    'Мышь – прицеливание, ЛКМ – стрельба',
                    'R – перезарядка',
                    'G – бросить гранату',
                    'C – установить C4',
                    'H – использовать аптечку',
                    'V – выпить спид-колу',
                    'B – открыть/закрыть магазин',
                    'Q – классовая способность',
                    'F – поставить турель',
                    'T – подобрать турель',
                    '1 / 2 / 3 – смена оружия',
                    'N – справка (это окно)',
                    'Босс: огромный запас здоровья, но уязвим для всего оружия'
                ];
                ctx.font = '18px Arial';
                lines.forEach((line, i) => ctx.fillText(line, W/2, 100 + i * 30));
                ctx.fillStyle = '#aaa'; ctx.font = '16px Arial';
                ctx.fillText('Нажмите N ещё раз, чтобы закрыть', W/2, 490);
                ctx.textAlign = 'start';
            }
        }

        // ==================== СОБЫТИЯ ====================
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            game.mouseX = e.clientX - rect.left;
            game.mouseY = e.clientY - rect.top;
        });
        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) {
                game.keys['mouseLeft'] = true;
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                if (game.shopOpen) {
                    if (game.shopTab === 'items') {
                        shopItems.forEach((item,i) => {
                            const y = 130 + i*40;
                            if (mx>W/2-160 && mx<W/2+160 && my>y-15 && my<y+20) buyItem(i);
                        });
                    } else if (game.shopTab === 'weapons') {
                        getShopWeapons().forEach((wpn,i) => {
                            const y = 130 + i*40;
                            if (mx>W/2-200 && mx<W/2+200 && my>y-15 && my<y+35) buyWeapon(wpn);
                        });
                    } else if (game.shopTab === 'melee') {
                        getShopMelee().forEach((wpn,i) => {
                            const y = 130 + i*40;
                            if (mx>W/2-200 && mx<W/2+200 && my>y-15 && my<y+35) buyWeapon(wpn);
                        });
                    }
                    if (my > 70 && my < 100) {
                        if (mx > W/2-250 && mx < W/2-150) game.shopTab = 'items';
                        if (mx > W/2-50 && mx < W/2+50) game.shopTab = 'weapons';
                        if (mx > W/2+150 && mx < W/2+250) game.shopTab = 'melee';
                    }
                }
            }
        });
        window.addEventListener('mouseup', e => { if (e.button === 0) game.keys['mouseLeft'] = false; });
        window.addEventListener('keydown', e => {
            game.keys[e.code] = true;
            if (e.code === 'KeyB') { game.shopOpen = !game.shopOpen; game.paused = game.shopOpen; game.shopTab = 'items'; }
            if (e.code === 'KeyN') {
                if (!game.shopOpen) {
                    game.helpOpen = !game.helpOpen;
                    game.paused = game.helpOpen;
                }
            }
            if (e.code === 'KeyG' && game.grenadeCount>0 && game.running && !game.paused) {
                const angle = Math.atan2(game.mouseY - game.player.y, game.mouseX - game.player.x);
                game.grenades.push(new Grenade(game.player.x, game.player.y, angle));
                game.grenadeCount--;
            }
            if (e.code === 'KeyC' && game.c4Count>0 && game.running && !game.paused) {
                game.c4s.push(new C4(game.player.x, game.player.y));
                game.c4Count--;
            }
            if (e.code === 'KeyH' && game.healpacks>0 && game.running && !game.paused) {
                game.player.health = Math.min(game.player.maxHealth, game.player.health + 30);
                game.healpacks--;
            }
            if (e.code === 'KeyV' && game.colaCount>0 && game.running && !game.paused) {
                game.colaCount--;
                game.playerBaseSpeed = game.player.baseSpeed;
                game.player.speed = game.player.baseSpeed * 1.5;
                game.speedBoostTimer = 10;
            }
            if (e.code === 'KeyQ' && game.running && !game.paused) useAbility();
            if (e.code === 'KeyF' && game.running && !game.paused) placeTurret();
            if (e.code === 'KeyT' && game.running && !game.paused) pickUpTurret();
            if (e.code === 'KeyR' && game.running && !game.paused) {
                const curW = game.weapons[game.currentWeaponIndex];
                const wDef = WEAPONS[curW.key];
                if (curW.ammo < wDef.magSize && !game.reloading && wDef.magSize !== Infinity) {
                    game.reloading = true;
                    game.reloadTimer = wDef.reloadTime;
                }
            }
            if (e.code === 'Digit1') game.currentWeaponIndex = 0;
            if (e.code === 'Digit2' && game.weapons.length > 1) game.currentWeaponIndex = 1;
            if (e.code === 'Digit3' && game.weapons.length > 2) game.currentWeaponIndex = 2;
            e.preventDefault();
        });
        window.addEventListener('keyup', e => { game.keys[e.code] = false; e.preventDefault(); });

        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                resetGame(btn.dataset.class);
                document.getElementById('classOverlay').classList.remove('active');
            });
        });

        function gameLoop() {
            if (game.running && !game.paused) {
                if (game.keys['mouseLeft']) { if (game.shootTimer <= 0) shootWeapon(); }
                if (game.shootTimer > 0) game.shootTimer -= 1/60;
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('classOverlay').classList.add('active');
        game.running = false;
        gameLoop();
    })();
</script>
</body>
</html>
